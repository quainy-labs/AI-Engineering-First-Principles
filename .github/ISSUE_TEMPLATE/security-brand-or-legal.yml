name: Security, brand, or legal concern
description: Report sensitive data exposure, license issue, Quainy brand misuse, or safety concern.
title: "[Security/Brand/Legal]: "
labels:
  - security
  - brand
body:
  - type: markdown
    attributes:
      value: |
        Please do not include secrets, private keys, customer data, or exploit details that would create risk.
        If a report is sensitive, share only a high-level description and ask maintainers for a safe contact path.

  - type: dropdown
    id: concern-type
    attributes:
      label: Concern type
      options:
        - Sensitive data or secret exposure
        - License or attribution concern
        - Quainy brand/trademark misuse
        - Unsafe AI guidance
        - Security issue in project material
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the concern without exposing sensitive details.
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Location
      description: Link, file, or section if safe to share.
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: Potential impact
      description: Who or what could be affected?
    validations:
      required: false

  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I did not include secrets, credentials, customer data, or sensitive exploit details in this issue.
          required: true
